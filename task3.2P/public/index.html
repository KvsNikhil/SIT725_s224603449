<!DOCTYPE html>
<html lang="en">

<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Recipe Collection</title>

  <!-- Materialize CSS -->
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Navigation Bar -->
  <header>
    <nav>
      <div class="nav-wrapper">
        <a href="/api/recipes" class="brand-logo left">
          <i class="material-icons">restaurant_menu</i>
          <span>My Recipe Collection</span>
        </a>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <div class="container">

      <!-- Heading -->
      <div class="section center-align">
        <h4>Explore Recipes</h4>
      </div>

      <!-- Cards Section -->
      <div class="row" id="recipe-section"></div>

    </div>
  </main>

  <!-- Recipe Modal -->
  <div id="recipeModal" class="modal">
    <div class="modal-content">
      <h4 id="modalTitle">Recipe Title</h4>
      <p id="modalDescription">Recipe description goes here</p>
      <img id="modalImage" src="" alt="Recipe" style="width: 100%; max-height: 300px; object-fit: cover;">
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-close waves-effect waves-green btn-flat">Close</a>
    </div>
  </div>

  <!-- jQuery (Required for Materialize & your script) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Materialize JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

  <!-- Custom Script -->
  <script src="js/scripts.js"></script>

</body>
</html>
